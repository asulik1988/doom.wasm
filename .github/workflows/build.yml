name: Build Doom WASM
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Binaryen
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen
          mkdir -p .binaryen/bin
          ln -s "$(which wasm-as)" .binaryen/bin/wasm-as
          ln -s "$(which wasm-merge)" .binaryen/bin/wasm-merge
          ln -s "$(which wasm-metadce)" .binaryen/bin/wasm-metadce

      - name: Build WASM via make
        run: make doom

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: doom-wasm
          path: build/doom.wasm
