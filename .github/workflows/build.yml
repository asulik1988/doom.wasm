name: Build Doom WASM
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Binaryen from GitHub release
        run: |
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/version_119/binaryen-version_119-x86_64-linux.tar.gz | tar xz
          mkdir -p .binaryen/bin
          cp binaryen-version_119/bin/wasm-as .binaryen/bin/
          cp binaryen-version_119/bin/wasm-merge .binaryen/bin/
          cp binaryen-version_119/bin/wasm-metadce .binaryen/bin/
          rm -rf binaryen-version_119

      - name: Build WASM via make
        run: make doom

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: doom-wasm
          path: build/doom.wasm
